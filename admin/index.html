<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充电桩后台统计系统</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <h1>⚡ 充电桩后台统计系统</h1>
            <div class="header-right">
                <span class="welcome">欢迎，管理员</span>
                <button class="btn btn-secondary">退出</button>
            </div>
        </header>

        <div class="admin-content">
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <ul>
                        <li class="nav-item active">
                            <a href="index.html">
                                <span class="nav-icon">📊</span>
                                <span class="nav-text">数据概览</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="users.html">
                                <span class="nav-icon">👥</span>
                                <span class="nav-text">用户分析</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="stations.html">
                                <span class="nav-icon">⚡</span>
                                <span class="nav-text">充电桩分析</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="time.html">
                                <span class="nav-icon">⏰</span>
                                <span class="nav-text">时段分析</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="region.html">
                                <span class="nav-icon">🗺️</span>
                                <span class="nav-text">地域分析</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a href="export.html">
                                <span class="nav-icon">📤</span>
                                <span class="nav-text">数据导出</span>
                            </a>
                        </li>
                    </ul>
                </nav>
            </aside>

            <main class="main-content">
                <div class="content-header">
                    <h2>数据概览</h2>
                    <div class="date-range">
                        <select id="dateRange">
                            <option value="today">今日</option>
                            <option value="week">本周</option>
                            <option value="month" selected>本月</option>
                            <option value="year">本年</option>
                        </select>
                        <button class="btn btn-primary">刷新数据</button>
                    </div>
                </div>

                <div class="stats-cards">
                    <div class="stat-card">
                        <div class="stat-icon">🔌</div>
                        <div class="stat-content">
                            <div class="stat-value" id="totalUsage">1,245</div>
                            <div class="stat-label">总使用次数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⚡</div>
                        <div class="stat-content">
                            <div class="stat-value" id="totalEnergy">3,245 kWh</div>
                            <div class="stat-label">总充电量</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">👤</div>
                        <div class="stat-content">
                            <div class="stat-value" id="totalUsers">456</div>
                            <div class="stat-label">总用户数</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">⏱️</div>
                        <div class="stat-content">
                            <div class="stat-value" id="avgDuration">45 分钟</div>
                            <div class="stat-label">平均充电时长</div>
                        </div>
                    </div>
                </div>

                <div class="charts-row">
                    <div class="chart-container">
                        <h3>24小时使用分布</h3>
                        <div id="usageHourChart" class="chart"></div>
                    </div>
                    <div class="chart-container">
                        <h3>区域使用热力图</h3>
                        <div id="regionChart" class="chart"></div>
                    </div>
                </div>

                <div class="charts-row">
                    <div class="chart-container">
                        <h3>充电桩使用率排名</h3>
                        <div id="stationUsageChart" class="chart"></div>
                    </div>
                    <div class="chart-container">
                        <h3>月度充电量趋势</h3>
                        <div id="monthlyTrendChart" class="chart"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
